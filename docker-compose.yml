version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15
    container_name: digital-self-postgres
    environment:
      POSTGRES_DB: digital_self
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - digital-self-network

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: digital-self-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - digital-self-network

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: digital-self-redis
    ports:
      - "6379:6379"
    networks:
      - digital-self-network

  # FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digital-self-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/digital_self
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MIMO_API_BASE=https://api.xiaomimimo.com/v1
      - MIMO_MODEL=mimo-v2.5-pro
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./knowledge:/app/knowledge
    depends_on:
      - postgres
      - qdrant
      - redis
    networks:
      - digital-self-network

  # Next.js 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digital-self-frontend
    ports:
      - "3000:3000"
    environment:
      - API_INTERNAL_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - digital-self-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: digital-self-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - digital-self-network

volumes:
  postgres_data:
  qdrant_data:

networks:
  digital-self-network:
    driver: bridge
